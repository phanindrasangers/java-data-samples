apiVersion: v2
name: java-data-stack
description: Portable umbrella chart for Cassandra, KeyDB, Kafka, and an optional Java application deployment.
type: application
version: 0.1.0
appVersion: "1.0.0"
dependencies:
  - name: cassandra
    alias: cassandra
    version: 12.3.11
    repository: https://charts.bitnami.com/bitnami
    condition: cassandra.enabled
  - name: keydb
    alias: keydb
    version: 0.5.22
    repository: https://charts.bitnami.com/bitnami
    condition: keydb.enabled
  - name: kafka
    alias: kafka
    version: 32.4.3
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
