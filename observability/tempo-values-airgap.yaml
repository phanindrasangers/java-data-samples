global:
  image:
    registry: registry.airgap.local

tempo:
  image:
    repository: grafana/tempo
    tag: null
    pullPolicy: IfNotPresent

  reportingEnabled: false

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces

  retention: 168h

persistence:
  enabled: true
  size: 20Gi

service:
  type: ClusterIP

serviceMonitor:
  enabled: true

